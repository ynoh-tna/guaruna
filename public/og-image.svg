<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#13213B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#2F6BFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2F6BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="1" r="0.6">
      <stop offset="0" stop-color="#11C29B" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#11C29B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2F6BFF"/>
      <stop offset="1" stop-color="#11C29B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- brand mark -->
  <g transform="translate(80,76)">
    <rect width="64" height="64" rx="16" fill="url(#mark)"/>
    <path d="M13 43 Q 24 18 33 32 T 53 21" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="53" cy="21" r="5.5" fill="#FF5C39" stroke="#FFFFFF" stroke-width="2.5"/>
  </g>
  <text x="166" y="120" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="44" font-weight="700" fill="#FFFFFF">Guaruna</text>

  <!-- title -->
  <text x="80" y="320" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="78" font-weight="600" fill="#FFFFFF">
    <tspan x="80" dy="0">Analyze your runs.</tspan>
    <tspan x="80" dy="94">Free running tools.</tspan>
  </text>

  <!-- subtitle -->
  <text x="80" y="540" font-family="'Inter', Helvetica, Arial, sans-serif" font-size="28" fill="#94A3B8">
    GPX viewer, editor &amp; converter &middot; race &amp; pace tools
  </text>

  <!-- url -->
  <text x="80" y="586" font-family="'Inter', Helvetica, Arial, sans-serif" font-size="23" font-weight="600" fill="#11C29B">
    guaruna.com
  </text>
</svg>
