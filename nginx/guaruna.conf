# /etc/nginx/sites-available/guaruna.conf
# Symlink:  ln -s /etc/nginx/sites-available/guaruna.conf /etc/nginx/sites-enabled/
# Reload:   nginx -t && systemctl reload nginx
#
# Assumes:
#   - Site files live in /var/www/guaruna
#   - TLS provisioned via certbot (Let's Encrypt)
#       certbot --nginx -d guaruna.com -d www.guaruna.com

# ---------- Rate limit for the GPX upload API ----------
# (this file is included inside nginx's http {} context, so this is valid here)
limit_req_zone $binary_remote_addr zone=guaruna_api:10m rate=20r/m;

# ---------- HTTP -> HTTPS, and www -> apex ----------
server {
    listen 80;
    listen [::]:80;
    server_name guaruna.com www.guaruna.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://guaruna.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.guaruna.com;

    ssl_certificate     /etc/letsencrypt/live/guaruna.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guaruna.com/privkey.pem;

    return 301 https://guaruna.com$request_uri;
}

# ---------- Apex (canonical) ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name guaruna.com;

    root /var/www/guaruna/public;
    index index.html;

    # ----- TLS -----
    ssl_certificate     /etc/letsencrypt/live/guaruna.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guaruna.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ----- Security headers -----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: https://*.google-analytics.com https://*.googletagmanager.com https://*.tile.openstreetmap.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' https://*.googletagmanager.com; connect-src 'self' https://nominatim.openstreetmap.org https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # ----- Performance: compression -----
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/xml application/xml application/xml+rss
        application/javascript application/x-javascript text/javascript
        application/json application/ld+json
        image/svg+xml application/manifest+json;

    # If brotli module is available, prefer it.
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml application/ld+json;

    # ----- SEO / crawler files -----
    location = /robots.txt   { access_log off; log_not_found off; }
    location = /sitemap.xml  { access_log off; log_not_found off; }
    location = /favicon.ico  { access_log off; log_not_found off; }
    location = /favicon.svg  { access_log off; log_not_found off; }

    # ----- Vendored libs (Leaflet, pinned version): cache hard -----
    # ^~ takes precedence over the regex blocks below, so these are never
    # revalidated -> the map library loads instantly on every navigation.
    location ^~ /vendor/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ----- JS/CSS: revalidate every load so deploys show immediately -----
    # (ETag-based 304s are cheap; avoids stale code after a git pull)
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "no-cache";
        access_log off;
        try_files $uri =404;
    }

    # ----- Other static assets: cached a week (no "immutable") -----
    location ~* \.(?:svg|ico|png|jpg|jpeg|webp|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    # ----- GPX routes (database) -----
    location ~* \.gpx$ {
        default_type application/gpx+xml;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    # ----- GPX database API (FastAPI on 127.0.0.1:8001) -----
    location /api/ {
        limit_req zone=guaruna_api burst=10 nodelay;
        client_max_body_size 12m;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- HTML: short cache so updates show fast -----
    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # ----- Block hidden files (.git, .env, etc.) -----
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ----- Custom error pages (fall back to index) -----
    error_page 404 /index.html;
}
